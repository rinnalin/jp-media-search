<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日剧日漫搜索 — 正版平台查询</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #fafaf8; --bg-card: #fff; --bg-input: #f3f2ef;
  --text: #2c2c2c; --text-secondary: #6b6b6b; --text-muted: #999;
  --border: #e5e3de; --accent: #c44f4f; --accent-hover: #a83a3a;
  --drama-badge: #4a7fb5; --anime-badge: #d4853c; --movie-badge: #6a9b5a;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-hover: 0 8px 30px rgba(0,0,0,.10);
  --radius: 14px; --radius-sm: 8px;
  --transition: .2s cubic-bezier(.4,0,.2,1);
  --font: "PingFang SC","Hiragino Sans GB","Microsoft YaHei","Noto Sans SC",sans-serif;
  --font-jp: "Hiragino Kaku Gothic ProN","Yu Gothic","Noto Sans JP",sans-serif;
}

[data-theme="dark"] {
  --bg: #1a1a1c; --bg-card: #242426; --bg-input: #2e2e30;
  --text: #e6e5e3; --text-secondary: #b0afad; --text-muted: #777;
  --border: #353537;
  --shadow: 0 1px 3px rgba(0,0,0,.2); --shadow-hover: 0 8px 30px rgba(0,0,0,.35);
}

html { scroll-behavior: smooth; }
body {
  font-family: var(--font); background: var(--bg); color: var(--text);
  line-height: 1.6; min-height: 100vh;
  transition: background var(--transition), color var(--transition);
}

.header {
  background: var(--bg-card); border-bottom: 1px solid var(--border);
  padding: 0 24px; position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(12px);
}
.header-inner {
  max-width: 1200px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
  height: 60px; gap: 16px;
}
.logo { font-size: 1.2rem; font-weight: 700; display: flex; align-items: center; gap: 8px; white-space: nowrap; }
.logo .icon { font-size: 1.5rem; }
.logo span { background: linear-gradient(135deg, #c44f4f, #c96a3b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.theme-toggle {
  background: var(--bg-input); border: 1px solid var(--border);
  width: 38px; height: 38px; border-radius: 50%;
  cursor: pointer; font-size: 1.1rem; display: flex;
  align-items: center; justify-content: center;
  transition: all var(--transition);
}
.theme-toggle:hover { border-color: var(--accent); }

.hero {
  background: linear-gradient(160deg, #f5f0eb 0%, #f0ece6 30%, #efe9df 100%);
  padding: 48px 24px 40px; text-align: center;
}
[data-theme="dark"] .hero { background: linear-gradient(160deg, #1e1d1f 0%, #1c1b1e 30%, #1a191c 100%); }
.hero h1 { font-size: 2rem; font-weight: 700; margin-bottom: 6px; }
.hero p { color: var(--text-secondary); font-size: .95rem; margin-bottom: 28px; }
.search-wrapper { max-width: 640px; margin: 0 auto; position: relative; }
.search-box {
  display: flex; align-items: center;
  background: var(--bg-card); border: 2px solid var(--border);
  border-radius: 50px; padding: 4px;
  transition: all var(--transition); box-shadow: var(--shadow);
}
.search-box:focus-within { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(196,79,79,.1); }
.search-box input {
  flex: 1; border: none; outline: none; background: transparent;
  padding: 12px 18px; font-size: 1rem; color: var(--text);
  font-family: var(--font); min-width: 0;
}
.search-box input::placeholder { color: var(--text-muted); }
.search-box button {
  background: var(--accent); color: #fff; border: none;
  padding: 10px 28px; border-radius: 50px; cursor: pointer;
  font-size: .95rem; font-weight: 600; white-space: nowrap;
  transition: background var(--transition); font-family: var(--font);
}
.search-box button:hover { background: var(--accent-hover); }
.search-hint { margin-top: 10px; font-size: .8rem; color: var(--text-muted); }

.filter-bar {
  max-width: 1200px; margin: 0 auto; padding: 16px 24px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
}
.cat-tabs { display: flex; gap: 4px; background: var(--bg-input); border-radius: 50px; padding: 3px; }
.cat-tab {
  padding: 7px 18px; border-radius: 50px; border: none; cursor: pointer;
  font-size: .85rem; font-weight: 500; font-family: var(--font);
  background: transparent; color: var(--text-secondary);
  transition: all var(--transition); white-space: nowrap;
}
.cat-tab.active { background: #fff; color: var(--text); box-shadow: var(--shadow); font-weight: 600; }
[data-theme="dark"] .cat-tab.active { background: #3a3a3c; }
.genre-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-left: 8px; }
.genre-chip {
  padding: 5px 14px; border-radius: 50px; border: 1px solid var(--border);
  cursor: pointer; font-size: .8rem; font-family: var(--font);
  background: transparent; color: var(--text-secondary);
  transition: all var(--transition); white-space: nowrap;
}
.genre-chip:hover { border-color: var(--accent); color: var(--accent); }
.genre-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.result-count { font-size: .82rem; color: var(--text-muted); margin-left: auto; white-space: nowrap; }

.results-grid {
  max-width: 1200px; margin: 0 auto; padding: 8px 24px 40px;
  display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 16px;
}

.card {
  background: var(--bg-card); border-radius: var(--radius);
  border: 1px solid var(--border); padding: 20px;
  box-shadow: var(--shadow); cursor: pointer;
  transition: all var(--transition); position: relative;
  display: flex; flex-direction: column; gap: 12px;
}
.card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }
.card-header { display: flex; gap: 12px; align-items: flex-start; }
.card-poster {
  width: 64px; height: 88px; border-radius: var(--radius-sm);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.8rem; overflow: hidden;
  background: linear-gradient(135deg, #e8e5df 0%, #ddd9d2 100%);
}
[data-theme="dark"] .card-poster { background: linear-gradient(135deg, #2e2d2f 0%, #262528 100%); }
.card-info { flex: 1; min-width: 0; }
.card-title { font-size: 1.05rem; font-weight: 700; line-height: 1.3; }
.card-title-jp { font-size: .82rem; color: var(--text-muted); font-family: var(--font-jp); margin-top: 2px; }
.card-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; align-items: center; }
.type-badge {
  display: inline-block; padding: 2px 10px; border-radius: 50px;
  font-size: .72rem; font-weight: 600; color: #fff;
}
.type-badge.drama { background: var(--drama-badge); }
.type-badge.anime { background: var(--anime-badge); }
.type-badge.movie { background: var(--movie-badge); }
.rating { font-size: .82rem; color: #e8a030; font-weight: 600; }
.year { font-size: .78rem; color: var(--text-muted); }
.card-genres { display: flex; gap: 4px; flex-wrap: wrap; }
.card-genres span { font-size: .72rem; padding: 2px 8px; border-radius: 50px; background: var(--bg-input); color: var(--text-secondary); }
.card-desc {
  font-size: .82rem; color: var(--text-secondary);
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden; line-height: 1.5;
}
.card-platforms { display: flex; flex-wrap: wrap; gap: 6px; }
.platform-link {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 5px 12px; border-radius: 50px; font-size: .78rem;
  font-weight: 500; text-decoration: none;
  border: 1.5px solid var(--border);
  color: var(--text-secondary); background: var(--bg-card);
  transition: all var(--transition);
}
.platform-link:hover { border-color: var(--accent); color: var(--accent); background: rgba(196,79,79,.04); }
.platform-link .pl-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(0,0,0,.45); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  padding: 20px; opacity: 0; pointer-events: none;
  transition: opacity .25s;
}
.modal-overlay.active { opacity: 1; pointer-events: auto; }
.modal {
  background: var(--bg-card); border-radius: var(--radius);
  max-width: 520px; width: 100%; max-height: 85vh;
  overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.25);
  padding: 28px; position: relative;
}
.modal-close {
  position: absolute; top: 14px; right: 14px;
  width: 34px; height: 34px; border-radius: 50%;
  border: 1px solid var(--border); background: var(--bg-card);
  cursor: pointer; font-size: 1.1rem; display: flex;
  align-items: center; justify-content: center;
  transition: all var(--transition); color: var(--text);
}
.modal-close:hover { background: var(--bg-input); }
.modal h2 { font-size: 1.4rem; margin-bottom: 4px; }
.modal .modal-jp { font-family: var(--font-jp); color: var(--text-muted); margin-bottom: 16px; font-size: .9rem; }
.modal .modal-desc { color: var(--text-secondary); margin-bottom: 20px; line-height: 1.7; }
.modal h3 { font-size: .95rem; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.modal-platforms { display: flex; flex-direction: column; gap: 8px; }
.modal-pl-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); text-decoration: none;
  color: var(--text); transition: all var(--transition);
}
.modal-pl-item:hover { border-color: var(--accent); background: rgba(196,79,79,.03); }
.modal-pl-item .pl-name { font-weight: 600; flex: 1; }
.modal-pl-item .pl-type { font-size: .76rem; padding: 3px 10px; border-radius: 50px; background: var(--bg-input); color: var(--text-secondary); }
.modal-pl-item .pl-arrow { color: var(--accent); font-size: 1.1rem; }

/* Fallback */
.fallback {
  max-width: 1200px; margin: 0 auto; padding: 20px 24px 48px;
  display: none;
}
.fallback.show { display: block; }
.fallback h3 { font-size: 1rem; margin-bottom: 12px; color: var(--text-secondary); }
.fallback-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.fallback-link {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 8px 18px; border-radius: 50px; text-decoration: none;
  font-size: .85rem; font-weight: 500; border: 1.5px solid var(--border);
  color: var(--text-secondary); transition: all var(--transition);
}
.fallback-link:hover { border-color: var(--accent); color: var(--accent); }

.empty-state { text-align: center; padding: 48px 20px; grid-column: 1 / -1; }
.empty-state .emoji { font-size: 3rem; margin-bottom: 12px; }
.empty-state p { color: var(--text-muted); }

.footer {
  text-align: center; padding: 24px; color: var(--text-muted);
  font-size: .75rem; border-top: 1px solid var(--border);
  max-width: 1200px; margin: 0 auto;
}

@media (max-width: 768px) {
  .header { padding: 0 16px; }
  .hero { padding: 32px 16px 28px; }
  .hero h1 { font-size: 1.5rem; }
  .search-box input { padding: 10px 14px; font-size: .9rem; }
  .search-box button { padding: 8px 20px; font-size: .85rem; }
  .filter-bar { padding: 12px 16px; gap: 8px; }
  .results-grid { grid-template-columns: 1fr; padding: 8px 16px 32px; }
  .genre-chips { margin-left: 0; }
  .result-count { margin-left: 0; width: 100%; text-align: left; }
  .modal { padding: 20px; }
}

@media (max-width: 400px) {
  .cat-tab { padding: 6px 12px; font-size: .78rem; }
  .genre-chip { padding: 4px 10px; font-size: .72rem; }
}
</style>
</head>

</div>

  query: '',
  category: 'all',
  activeGenre: null,
  theme: localStorage.getItem('jp-search-theme') || 'light'
};

// ==================== UTILS ====================
function debounce(fn, ms) {
  var timer;
  return function() {
    var self = this;
    var args = arguments;
    clearTimeout(timer);
    timer = setTimeout(function() { fn.apply(self, args); }, ms);
  };
}

function highlightText(text, query) {
  if (!query) return text;
  var escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  var regex = new RegExp('(' + escaped + ')', 'gi');
  return text.replace(regex, '<mark style="background:#ffe082;padding:0 2px;border-radius:3px;">$1</mark>');
}

function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// 自动编码 URL 中的中文/日文字符
function encodeURL(url) {
  var qIndex = url.indexOf('?');
  if (qIndex === -1) return url;
  return url.substring(0, qIndex + 1) + encodeURI(url.substring(qIndex + 1));
}

function getAllGenres() {
  var genreSet = {};
  DATABASE.forEach(function(d) {
    d.genres.forEach(function(g) { genreSet[g] = true; });
  });
  return Object.keys(genreSet).sort();
}

function renderGenreChips() {
  var container = document.getElementById('genreChips');
  var genres = getAllGenres();
  var html = '';
  for (var i = 0; i < genres.length; i++) {
    var g = genres[i];
    var activeClass = state.activeGenre === g ? ' active' : '';
    html += '<button class="genre-chip' + activeClass + '" data-genre="' + g + '">' + g + '</button>';
  }
  container.innerHTML = html;
}

function renderResults() {
  var data = getFilteredData();
  var grid = document.getElementById('resultsGrid');
  var fallback = document.getElementById('fallbackSection');
  var resultCount = document.getElementById('resultCount');
  var q = state.query.trim();

  // Update counts
  document.getElementById('totalCount').textContent = DATABASE.length;
  if (data.length === 0 && q) {
    resultCount.textContent = '未找到匹配结果';
  } else if (data.length === DATABASE.length) {
    resultCount.textContent = '共 ' + DATABASE.length + ' 部作品';
  } else {
    resultCount.textContent = '找到 ' + data.length + ' / ' + DATABASE.length + ' 部';
  }

  // Show/hide fallback
  if (data.length === 0 && q) {
    fallback.classList.add('show');
    renderFallbackLinks(q);
  } else {
    fallback.classList.remove('show');
  }

  // Empty states
  if (data.length === 0 && !q) {
    grid.innerHTML = '<div class="empty-state"><div class="emoji">🎬</div><p>请使用搜索框或筛选器查找作品</p></div>';
    return;
  }
  if (data.length === 0 && q) {
    grid.innerHTML = '<div class="empty-state"><div class="emoji">🔍</div><p>没有找到匹配 <strong>' + escapeHtml(q) + '</strong> 的作品</p><p style="margin-top:8px;font-size:.85rem;">试试其他关键词,或使用下方平台直接搜索</p></div>';
    return;
  }

  // Render cards
  var html = '';
  for (var i = 0; i < data.length; i++) {
    var d = data[i];
    var typeLabel = d.type === 'drama' ? '日剧' : d.type === 'anime' ? '日漫' : '电影';
    var typeClass = d.type;
    var posterEmoji = d.type === 'drama' ? '📺' : d.type === 'anime' ? '🎨' : '🎬';

    html += '<div class="card" data-id="' + d.id + '" onclick="openModal(' + d.id + ')">';
    html += '<div class="card-header">';
    html += '<div class="card-poster">' + posterEmoji + '</div>';
    html += '<div class="card-info">';
    html += '<div class="card-title">' + highlightText(escapeHtml(d.title), q) + '</div>';
    html += '<div class="card-title-jp">' + highlightText(escapeHtml(d.title_jp), q) + '</div>';
    html += '<div class="card-meta">';
    html += '<span class="type-badge ' + typeClass + '">' + typeLabel + '</span>';
    html += '<span class="rating">⭐ ' + d.rating + '</span>';
    html += '<span class="year">' + d.year + '</span>';
    html += '</div>';
    html += '<div class="card-genres">';
    for (var j = 0; j < d.genres.length; j++) {
      html += '<span>' + highlightText(escapeHtml(d.genres[j]), q) + '</span>';
    }
    html += '</div></div></div>';
    html += '<div class="card-desc">' + highlightText(escapeHtml(d.desc), q) + '</div>';
    html += '<div class="card-platforms">';
    for (var k = 0; k < d.platforms.length; k++) {
      var p = d.platforms[k];
      html += '<a href="' + encodeURL(p.url) + '" target="_blank" class="platform-link" onclick="event.stopPropagation()" title="在' + p.name + '搜索">';
      html += '<span class="pl-dot" style="background:' + p.color + '"></span>' + p.name + '</a>';
    }
    html += '</div></div>';
  }
  grid.innerHTML = html;
}

function renderFallbackLinks(query) {
  var container = document.getElementById('fallbackLinks');
  var html = '';
  for (var i = 0; i < FALLBACK_PLATFORMS.length; i++) {
    var p = FALLBACK_PLATFORMS[i];
    var url = p.url.replace('{q}', encodeURIComponent(query));
    html += '<a href="' + url + '" target="_blank" class="fallback-link">' + p.icon + ' ' + p.name + '搜索「' + escapeHtml(query) + '」</a>';
  }
  container.innerHTML = html;
}

function openModal(id) {
  var d = null;
  for (var i = 0; i < DATABASE.length; i++) {
    if (DATABASE[i].id === id) { d = DATABASE[i]; break; }
  }
  if (!d) return;

  var typeLabel = d.type === 'drama' ? '日剧' : d.type === 'anime' ? '日漫' : '电影';
  var overlay = document.getElementById('modalOverlay');
  var modal = document.getElementById('modal');

  var html = '';
  html += '<button class="modal-close" onclick="closeModal()">✕</button>';
  html += '<span class="type-badge ' + d.type + '" style="margin-bottom:8px;display:inline-block;">' + typeLabel + '</span>';
  html += '<h2>' + escapeHtml(d.title) + '</h2>';
  html += '<div class="modal-jp">' + escapeHtml(d.title_jp) + ' · ' + d.year + ' · ⭐ ' + d.rating + '</div>';
  html += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;">';
  for (var j = 0; j < d.genres.length; j++) {
    html += '<span style="font-size:.78rem;padding:3px 10px;border-radius:50px;background:var(--bg-input);color:var(--text-secondary);">' + escapeHtml(d.genres[j]) + '</span>';
  }
  html += '</div>';
  html += '<p class="modal-desc">' + escapeHtml(d.desc) + '</p>';
  html += '<h3>📡 正版播放平台</h3>';
  html += '<div class="modal-platforms">';
  for (var k = 0; k < d.platforms.length; k++) {
    var p = d.platforms[k];
    html += '<a href="' + encodeURL(p.url) + '" target="_blank" class="modal-pl-item">';
    html += '<span style="width:10px;height:10px;border-radius:50%;background:' + p.color + ';flex-shrink:0;"></span>';
    html += '<span class="pl-name">' + p.name + '</span>';
    html += '<span class="pl-type">点击搜索播放</span>';
    html += '<span class="pl-arrow">→</span>';
    html += '</a>';
  }
  html += '</div>';
  html += '<p style="margin-top:16px;font-size:.78rem;color:var(--text-muted);text-align:center;">💡 点击平台链接后,在对应平台内查找播放地址<br>版权分布可能随时变动,以平台实际情况为准</p>';

  modal.innerHTML = html;
  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  document.body.style.overflow = '';
}

// ==================== THEME ====================
function setTheme(theme) {
  state.theme = theme;
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('jp-search-theme', theme);
  document.getElementById('themeToggle').textContent = theme === 'dark' ? '☀️' : '🌙';
}

function toggleTheme() {
  setTheme(state.theme === 'dark' ? 'light' : 'dark');
}

// ==================== EVENT HANDLERS ====================
var searchInput = document.getElementById('searchInput');
var searchBtn = document.getElementById('searchBtn');

function doSearch() {
  state.query = searchInput.value;
  state.activeGenre = null;
  renderGenreChips();
  renderResults();
}

searchInput.addEventListener('input', debounce(function() {
  state.query = searchInput.value;
  renderResults();
}, 200));

searchInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doSearch();
});

searchBtn.addEventListener('click', doSearch);

// Category tabs
document.getElementById('catTabs').addEventListener('click', function(e) {
  var tab = e.target.closest('.cat-tab');
  if (!tab) return;
  var tabs = this.querySelectorAll('.cat-tab');
  for (var i = 0; i < tabs.length; i++) { tabs[i].classList.remove('active'); }
  tab.classList.add('active');
  state.category = tab.dataset.cat;
  renderResults();
});

// Genre chips
document.getElementById('genreChips').addEventListener('click', function(e) {
  var chip = e.target.closest('.genre-chip');
  if (!chip) return;
  var genre = chip.dataset.genre;
  if (state.activeGenre === genre) {
    state.activeGenre = null;
  } else {
    state.activeGenre = genre;
  }
  renderGenreChips();
  renderResults();
});

// Modal close
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

// Theme toggle
document.getElementById('themeToggle').addEventListener('click', toggleTheme);

// ==================== INIT ====================
function init() {
  setTheme(state.theme);
  renderGenreChips();
  renderResults();
}

init();
</script>
